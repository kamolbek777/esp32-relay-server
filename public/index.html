<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Remote Control</title>
  <style>
    :root {
      --bg-a: #030712;
      --bg-b: #0f1a33;
      --panel: rgba(9, 15, 31, 0.84);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e5eefc;
      --muted: rgba(229, 238, 252, 0.6);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 22%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.16), transparent 25%),
        linear-gradient(155deg, var(--bg-a), var(--bg-b) 45%, #14203b);
      display: grid;
      place-items: center;
      padding: 28px 14px;
    }

    .shell {
      width: min(100%, 420px);
      display: grid;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .audio-button {
      width: 54px;
      height: 54px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 42px rgba(2, 6, 23, 0.38);
      color: var(--text);
      cursor: pointer;
      position: relative;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .audio-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 48px rgba(2, 6, 23, 0.48);
    }

    .audio-button svg {
      width: 22px;
      height: 22px;
      display: block;
      margin: 0 auto;
    }

    .audio-button.live {
      box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.08), 0 20px 48px rgba(34, 197, 94, 0.18);
    }

    .indicator {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 0 0 18px rgba(239, 68, 68, 0.45);
      transition: background 0.18s ease, box-shadow 0.18s ease;
    }

    .indicator.online {
      background: #22c55e;
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.45);
    }

    .orb {
      width: 92px;
      height: 92px;
      margin: 0 auto;
      border-radius: 999px;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 6px rgba(255, 255, 255, 0.04),
        0 18px 46px rgba(2, 6, 23, 0.45),
        inset 0 0 24px rgba(255, 255, 255, 0.12);
    }

    .palette-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 16px;
      box-shadow: 0 18px 60px rgba(2, 6, 23, 0.44);
    }

    .palette-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 7px;
      max-height: 360px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .palette::-webkit-scrollbar { width: 8px; }
    .palette::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.14);
      border-radius: 999px;
    }

    .swatch {
      height: 20px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }

    .swatch:hover {
      transform: translateY(-1px) scale(1.04);
    }

    .swatch.active {
      border-color: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 520px) {
      .shell { width: min(100%, 360px); }
      .palette { grid-template-columns: repeat(8, minmax(0, 1fr)); }
      .orb { width: 84px; height: 84px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <button id="audio" class="audio-button" type="button" aria-label="Toggle live audio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 5 6 9H3v6h3l5 4z"></path>
          <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
          <path d="M17.8 6a8.2 8.2 0 0 1 0 12"></path>
        </svg>
      </button>
      <div id="status" class="indicator" title="Connection status"></div>
    </div>

    <div id="orb" class="orb"></div>

    <section class="palette-panel">
      <div class="palette-header">
        <span>Color Grid</span>
        <span id="hexLabel">#010101</span>
      </div>
      <div id="palette" class="palette"></div>
    </section>
  </main>

  <script>
    const deviceId = new URLSearchParams(location.search).get("deviceId") || "esp32s3-room-1";
    const token = new URLSearchParams(location.search).get("token") || "change-this-token";
    const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${wsProtocol}://${location.host}/ws/app?deviceId=${encodeURIComponent(deviceId)}&token=${encodeURIComponent(token)}`);

    const orb = document.getElementById("orb");
    const audioButton = document.getElementById("audio");
    const status = document.getElementById("status");
    const palette = document.getElementById("palette");
    const hexLabel = document.getElementById("hexLabel");

    let audioEnabled = false;
    let audioContext;
    let nextPlayTime = 0;
    let currentHex = "#010101";

    const paletteColors = [];
    for (let h = 0; h < 360; h += 12) {
      for (let l = 34; l <= 74; l += 10) {
        const s = 90;
        paletteColors.push(hslToHex(h, s, l));
      }
    }
    paletteColors.push("#010101", "#080808", "#111827", "#1F2937", "#F8FAFC", "#EF4444", "#22C55E", "#3B82F6", "#EAB308", "#A855F7");

    function hslToHex(h, s, l) {
      s /= 100;
      l /= 100;
      const k = n => (n + h / 30) % 12;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const color = l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
        return Math.round(255 * color).toString(16).padStart(2, "0");
      };
      return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
    }

    function setOrb(color) {
      currentHex = color.toUpperCase();
      hexLabel.textContent = currentHex;
      orb.style.background = `radial-gradient(circle at 30% 30%, rgba(255,255,255,.58), ${currentHex} 38%, #020617 130%)`;
      for (const button of palette.querySelectorAll(".swatch")) {
        button.classList.toggle("active", button.dataset.hex === currentHex);
      }
    }

    function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new AudioContext({ sampleRate: 16000 });
      }
    }

    function playPcm(buffer) {
      ensureAudioContext();
      const samples = new Int16Array(buffer);
      const audioBuffer = audioContext.createBuffer(1, samples.length, 16000);
      const channel = audioBuffer.getChannelData(0);
      for (let i = 0; i < samples.length; i += 1) {
        channel[i] = samples[i] / 32768;
      }
      const source = audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioContext.destination);
      const now = audioContext.currentTime;
      if (nextPlayTime - now > 0.04) {
        nextPlayTime = now + 0.005;
      }
      if (nextPlayTime < now) {
        nextPlayTime = now + 0.005;
      }
      source.start(nextPlayTime);
      nextPlayTime += audioBuffer.duration;
    }

    function sendColor(hex) {
      setOrb(hex);
      ws.send(JSON.stringify({ type: "color", hex }));
    }

    function buildPalette() {
      const unique = [...new Set(paletteColors)].slice(0, 200);
      for (const hex of unique) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "swatch";
        button.dataset.hex = hex;
        button.style.background = hex;
        button.title = hex;
        button.addEventListener("click", () => sendColor(hex));
        palette.appendChild(button);
      }
    }

    audioButton.addEventListener("click", async () => {
      audioEnabled = !audioEnabled;
      audioButton.classList.toggle("live", audioEnabled);
      ensureAudioContext();
      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }
      if (audioEnabled) {
        nextPlayTime = 0;
      }
      ws.send(JSON.stringify({ type: "audio", audio: audioEnabled, enabled: audioEnabled }));
    });

    ws.addEventListener("message", async (event) => {
      if (typeof event.data !== "string") {
        if (audioEnabled) {
          const buffer = await event.data.arrayBuffer();
          playPcm(buffer);
        }
        return;
      }

      const message = JSON.parse(event.data);
      if (message.type === "state") {
        if (message.hex) {
          setOrb(message.hex);
        }
        if (typeof message.audio === "boolean") {
          audioEnabled = message.audio;
          audioButton.classList.toggle("live", audioEnabled);
        }
      }
      if (message.type === "status") {
        status.classList.toggle("online", !!message.online);
      }
    });

    buildPalette();
    setOrb(currentHex);
  </script>
</body>
</html>
