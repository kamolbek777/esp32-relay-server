<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Remote Control</title>
  <style>
    :root {
      --bg-a: #030712;
      --bg-b: #0f1a33;
      --panel: rgba(9, 15, 31, 0.84);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e5eefc;
      --muted: rgba(229, 238, 252, 0.62);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 22%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.16), transparent 25%),
        linear-gradient(155deg, var(--bg-a), var(--bg-b) 45%, #14203b);
      display: grid;
      place-items: center;
      padding: 24px 14px;
    }

    .shell {
      width: min(100%, 460px);
      display: grid;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .audio-button {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 42px rgba(2, 6, 23, 0.38);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .audio-button:hover {
      transform: translateY(-1px);
    }

    .audio-button svg {
      width: 22px;
      height: 22px;
      display: block;
      margin: 0 auto;
    }

    .audio-button.live {
      box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.08), 0 20px 48px rgba(34, 197, 94, 0.18);
    }

    .indicator {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 0 0 18px rgba(239, 68, 68, 0.45);
      transition: background 0.18s ease, box-shadow 0.18s ease;
    }

    .indicator.online {
      background: #22c55e;
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.45);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 16px;
      box-shadow: 0 18px 60px rgba(2, 6, 23, 0.44);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 62px;
      gap: 14px;
      align-items: stretch;
    }

    .palette-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 7px;
      max-height: 360px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .palette::-webkit-scrollbar,
    .brightness-wrap::-webkit-scrollbar {
      width: 8px;
    }

    .palette::-webkit-scrollbar-thumb,
    .brightness-wrap::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.14);
      border-radius: 999px;
    }

    .swatch {
      height: 22px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }

    .swatch:hover {
      transform: translateY(-1px) scale(1.03);
    }

    .swatch.active {
      border-color: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.18);
    }

    .brightness-wrap {
      display: grid;
      justify-items: center;
      gap: 10px;
      padding: 8px 0;
    }

    .brightness-title {
      font-size: 12px;
      color: var(--muted);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      letter-spacing: 0.08em;
    }

    .brightness {
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      width: 42px;
      height: 280px;
      background: transparent;
      cursor: pointer;
    }

    .brightness-value {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 520px) {
      .shell { width: min(100%, 380px); }
      .controls { grid-template-columns: 1fr 56px; }
      .palette { grid-template-columns: repeat(8, minmax(0, 1fr)); }
      .brightness { height: 240px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <button id="audio" class="audio-button" type="button" aria-label="Toggle live audio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 5 6 9H3v6h3l5 4z"></path>
          <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
          <path d="M17.8 6a8.2 8.2 0 0 1 0 12"></path>
        </svg>
      </button>
      <div id="status" class="indicator" title="Connection status"></div>
    </div>

    <section class="panel controls">
      <div>
        <div class="palette-header">
          <span>Color Grid</span>
          <span id="hexLabel">#010101</span>
        </div>
        <div id="palette" class="palette"></div>
      </div>

      <div class="brightness-wrap">
        <div class="brightness-title">Brightness</div>
        <input id="brightness" class="brightness" type="range" min="1" max="10" step="1" value="1">
        <div id="brightnessValue" class="brightness-value">1/10</div>
      </div>
    </section>
  </main>

  <script>
    const deviceId = new URLSearchParams(location.search).get("deviceId") || "esp32s3-room-1";
    const token = new URLSearchParams(location.search).get("token") || "change-this-token";
    const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${wsProtocol}://${location.host}/ws/app?deviceId=${encodeURIComponent(deviceId)}&token=${encodeURIComponent(token)}`);

    const audioButton = document.getElementById("audio");
    const status = document.getElementById("status");
    const palette = document.getElementById("palette");
    const hexLabel = document.getElementById("hexLabel");
    const brightness = document.getElementById("brightness");
    const brightnessValue = document.getElementById("brightnessValue");

    let audioEnabled = false;
    let audioContext;
    let nextPlayTime = 0;
    let currentHex = "#010101";
    let currentBase = { r: 1, g: 1, b: 1 };
    let currentLevel = 1;

    const paletteEntries = [];
    const baseColors = [
      "#000000", "#FFFFFF", "#9CA3AF", "#6B7280", "#7C2D12",
      "#B45309", "#92400E", "#DC2626", "#F97316", "#EAB308",
      "#84CC16", "#22C55E", "#14B8A6", "#06B6D4", "#3B82F6",
      "#1D4ED8", "#6366F1", "#8B5CF6", "#D946EF", "#EC4899"
    ];

    function hexToRgb(hex) {
      const clean = hex.replace("#", "");
      return {
        r: parseInt(clean.slice(0, 2), 16),
        g: parseInt(clean.slice(2, 4), 16),
        b: parseInt(clean.slice(4, 6), 16)
      };
    }

    function rgbToHex(r, g, b) {
      return `#${[r, g, b].map(v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0")).join("")}`.toUpperCase();
    }

    for (const baseHex of baseColors) {
      const rgb = hexToRgb(baseHex);
      for (let level = 1; level <= 10; level += 1) {
        const factor = level / 10;
        const hex = rgbToHex(rgb.r * factor, rgb.g * factor, rgb.b * factor);
        paletteEntries.push({
          r: rgb.r,
          g: rgb.g,
          b: rgb.b,
          level,
          hex
        });
      }
    }

    function findClosestBase(hex) {
      const rgb = hexToRgb(hex);
      let best = paletteEntries[0];
      let bestScore = Infinity;
      for (const entry of paletteEntries) {
        const c = hexToRgb(entry.hex);
        const score = Math.abs(c.r - rgb.r) + Math.abs(c.g - rgb.g) + Math.abs(c.b - rgb.b);
        if (score < bestScore) {
          bestScore = score;
          best = entry;
        }
      }
      return best;
    }

    function updateSelectedHex(hex) {
      currentHex = hex.toUpperCase();
      hexLabel.textContent = currentHex;
      for (const button of palette.querySelectorAll(".swatch")) {
        button.classList.toggle("active", button.dataset.hex === currentHex);
      }
    }

    function colorFromBaseAndLevel(base, level) {
      const factor = Number(level) / 10;
      return rgbToHex(base.r * factor, base.g * factor, base.b * factor);
    }

    function applyBrightnessLevel(level, shouldSend = true) {
      currentLevel = Number(level);
      brightness.value = String(currentLevel);
      brightnessValue.textContent = `${currentLevel}/10`;
      const hex = colorFromBaseAndLevel(currentBase, currentLevel);
      updateSelectedHex(hex);
      if (shouldSend) {
        ws.send(JSON.stringify({ type: "color", hex }));
      }
    }

    function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new AudioContext({ sampleRate: 16000 });
      }
    }

    function playPcm(buffer) {
      ensureAudioContext();
      const samples = new Int16Array(buffer);
      const audioBuffer = audioContext.createBuffer(2, samples.length, 16000);
      const left = audioBuffer.getChannelData(0);
      const right = audioBuffer.getChannelData(1);
      for (let i = 0; i < samples.length; i += 1) {
        const v = samples[i] / 32768;
        left[i] = v;
        right[i] = v;
      }
      const source = audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioContext.destination);
      const now = audioContext.currentTime;
      if (nextPlayTime - now > 0.04) {
        nextPlayTime = now + 0.005;
      }
      if (nextPlayTime < now) {
        nextPlayTime = now + 0.005;
      }
      source.start(nextPlayTime);
      nextPlayTime += audioBuffer.duration;
    }

    function buildPalette() {
      for (const entry of paletteEntries) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "swatch";
        button.dataset.hex = entry.hex;
        button.style.background = entry.hex;
        button.title = entry.hex;
        button.addEventListener("click", () => {
          currentBase = { r: entry.r, g: entry.g, b: entry.b };
          applyBrightnessLevel(entry.level, true);
        });
        palette.appendChild(button);
      }
    }

    brightness.addEventListener("input", () => {
      applyBrightnessLevel(brightness.value, true);
    });

    audioButton.addEventListener("click", async () => {
      audioEnabled = !audioEnabled;
      audioButton.classList.toggle("live", audioEnabled);
      ensureAudioContext();
      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }
      if (audioEnabled) {
        nextPlayTime = 0;
      }
      ws.send(JSON.stringify({ type: "audio", audio: audioEnabled, enabled: audioEnabled }));
    });

    ws.addEventListener("message", async (event) => {
      if (typeof event.data !== "string") {
        if (audioEnabled) {
          const buffer = await event.data.arrayBuffer();
          playPcm(buffer);
        }
        return;
      }

      const message = JSON.parse(event.data);
      if (message.type === "state") {
        if (message.hex) {
          const closest = findClosestBase(message.hex);
          currentBase = { r: closest.r, g: closest.g, b: closest.b };
          applyBrightnessLevel(closest.level, false);
          updateSelectedHex(message.hex);
        }
        if (typeof message.audio === "boolean") {
          audioEnabled = message.audio;
          audioButton.classList.toggle("live", audioEnabled);
        }
      }
      if (message.type === "status") {
        status.classList.toggle("online", !!message.online);
      }
    });

    buildPalette();
    applyBrightnessLevel(1, false);
  </script>
</body>
</html>
